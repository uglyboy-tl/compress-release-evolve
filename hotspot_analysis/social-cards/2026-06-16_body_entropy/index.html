<!doctype html>
<html lang="zh-CN" data-theme="indigo-porcelain">
<head>
  <meta charset="utf-8">
  <title>最好的身体投资，其实是每晚的睡眠 · 微信封面</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root,
    [data-theme="indigo-porcelain"] {
      --paper:     #f2f4f5;
      --paper-2:   #e5ebef;
      --ink:       #0a1f3d;
      --muted:     #5f6d78;
      --line:      rgba(10,31,61,.20);
      --accent:    #315d93;
      --accent-soft: #d7e1ec;
      --ink-rgb: 10,31,61;
      --paper-rgb: 242,244,245;
      --accent-rgb: 49,93,147;
    }

    *,*::before,*::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--paper);
      font-family: "LXGW WenKai GB Screen", "LXGW WenKai", -apple-system, "PingFang SC", sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      padding: 64px 32px;
    }
    .sheet { display: flex; flex-direction: column; align-items: center; gap: 48px; }

    .poster {
      position: relative;
      background: var(--paper);
      color: var(--ink);
      overflow: hidden;
      isolation: isolate;
    }
    .poster.square { width: 1080px; height: 1080px; }
    .poster.wide   { width: 2100px; height:  900px; }

    .poster.square .content { padding: 88px 88px; }
    .poster.wide   .content { padding: 88px 120px; }
    .content { position: relative; width: 100%; height: 100%; z-index: 2; display: flex; flex-direction: column; }

    /* Background layers */
    .mag-bg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .grain {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      opacity: .35; mix-blend-mode: multiply;
      background-image: radial-gradient(rgba(0,0,0,.045) 1px, transparent 1px);
      background-size: 3px 3px;
    }
    .paper-wash {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background: linear-gradient(180deg, rgba(var(--ink-rgb),.02), rgba(var(--ink-rgb),.05) 60%, rgba(var(--ink-rgb),.08));
    }

    /* Typography */
    .kicker {
      font-family: "LXGW WenKai Mono", ui-monospace, monospace;
      font-size: 21px; letter-spacing: .22em; text-transform: uppercase;
      color: rgba(var(--ink-rgb), .55); margin: 0 0 18px;
    }
    .h-display {
      font-family: "LXGW WenKai GB Screen", "LXGW WenKai", serif;
      font-weight: 500; font-size: 124px; line-height: 1.06;
      letter-spacing: .04em; margin: 0 0 24px; color: var(--ink);
    }
    .h-xl {
      font-family: "LXGW WenKai GB Screen", "LXGW WenKai", serif;
      font-weight: 500; font-size: 88px; line-height: 1.10;
      letter-spacing: .03em; margin: 0 0 24px; color: var(--ink);
    }

    .poster.square .h-display { font-size: 116px; }
    .poster.wide .h-display   { font-size: 128px; }

    .issue-row {
      display: flex; align-items: center; gap: 16px;
      font-family: "LXGW WenKai Mono", ui-monospace, monospace;
      font-size: 20px; letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted);
    }
    .issue-row .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

    .issue-strip {
      position: absolute; left: 120px; right: 120px; bottom: 56px;
      display: flex; justify-content: space-between; align-items: center;
      font-family: "LXGW WenKai Mono", ui-monospace, monospace;
      font-size: 18px; letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted);
      border-top: 1px solid var(--line); padding-top: 18px;
    }
    .poster.square .issue-strip { left: 88px; right: 88px; }

    .stack { display: flex; flex-direction: column; }
    .gap-2 { gap: 24px; }
    .gap-3 { gap: 36px; }
    .gap-4 { gap: 48px; }
    .grow  { flex: 1; }

    .frame-img {
      position: relative; overflow: hidden;
      background: var(--paper-2); display: block; margin: 0;
    }
    .frame-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .frame-img.r-21x9 { aspect-ratio: 21 / 9; }

  </style>
</head>
<body>
  <main class="sheet">

    <!-- 21:9 主封面 -->
    <section class="poster wide" id="wechat-21x9">
      <canvas class="mag-bg" data-bg="ink-flow"></canvas>
      <div class="grain"></div>
      <div class="paper-wash"></div>
      <div class="content stack gap-4">
        <div class="issue-row">
          <span>低熵生活</span><span class="dot"></span><span>2026.06.16</span>
        </div>
        <div class="stack gap-2 grow">
          <h1 class="h-display">最好的身体投资<br>其实是每晚的睡眠</h1>
        </div>
        <figure class="frame-img r-21x9">
          <img src="assets/hero-sleep.jpg" alt="深夜睡眠" style="object-position:center 50%">
        </figure>
      </div>
      <div class="issue-strip">
        <span>系统理论 · 健康与身体</span>
        <span>—</span>
        <span>by 低熵生活</span>
      </div>
    </section>

    <!-- 1:1 方形封面 -->
    <section class="poster square" id="wechat-1x1">
      <canvas class="mag-bg" data-bg="ink-flow"></canvas>
      <div class="grain"></div>
      <div class="paper-wash"></div>
      <div class="content stack gap-4">
        <div class="issue-row">
          <span>低熵生活</span><span class="dot"></span><span>2026.06.16</span>
        </div>
        <div class="stack gap-2 grow" style="justify-content:center">
          <h1 class="h-display" style="margin-bottom:12px">最好的身体投资</h1>
          <p style="font-family:'LXGW WenKai GB Screen','LXGW WenKai',serif;font-size:36px;line-height:1.4;color:rgba(var(--ink-rgb),.72);margin:0">其实是每晚的睡眠</p>
        </div>
      </div>
      <div class="issue-strip">
        <span>系统理论 · 健康与身体</span>
        <span>—</span>
        <span>by 低熵生活</span>
      </div>
    </section>

  </main>

  <script src="assets/magazine-bg-webgl.js"></script>
  <script>
    (function () {
      function cssVarRgb(name, fallback) {
        var raw = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        if (!raw) return fallback;
        var parts = raw.split(',').map(function (x) { return parseInt(x.trim(), 10); });
        return parts.length === 3 && parts.every(function (n) { return !isNaN(n); }) ? parts : fallback;
      }
      function mountAll() {
        if (!window.MagazineBg || !window.MagazineBg.mount) return;
        var ink    = cssVarRgb('--ink-rgb',    [10, 31, 61]);
        var paper  = cssVarRgb('--paper-rgb',  [242, 244, 245]);
        var accent = cssVarRgb('--accent-rgb', [49, 93, 147]);
        document.querySelectorAll('canvas.mag-bg').forEach(function (c) {
          window.MagazineBg.mount(c, {
            ink: ink, paper: paper, accent: accent,
            strength: 0.32, frozenTime: 12.5
          });
        });
      }
      if (document.readyState === 'complete') mountAll();
      else window.addEventListener('load', mountAll);
    })();
  </script>
</body>
</html>
